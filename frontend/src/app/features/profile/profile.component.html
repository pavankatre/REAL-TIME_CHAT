<div
    class="min-h-screen bg-slate-50 dark:bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 flex justify-center transition-colors duration-300">
    <div
        class="max-w-2xl w-full glass p-8 sm:p-10 rounded-3xl shadow-2xl relative border border-slate-200 dark:border-slate-800 animate-fade-in">
        <!-- Back Button -->
        <button (click)="goBack()"
            class="absolute top-6 left-6 p-2 rounded-xl text-slate-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all active:scale-90"
            aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>

        <!-- Profile Header -->
        <div class="flex flex-col sm:flex-row items-center gap-8 mb-12 mt-6">
            <div class="relative group">
                <div
                    class="absolute -inset-1 bg-gradient-to-r from-primary-600 to-indigo-600 rounded-full blur opacity-25 group-hover:opacity-40 transition duration-1000 group-hover:duration-200">
                </div>
                <img [src]="profile()?.avatarUrl || 'https://via.placeholder.com/100'" alt="Avatar"
                    class="relative w-32 h-32 rounded-full object-cover shadow-2xl bg-white dark:bg-slate-800 ring-4 ring-white dark:ring-slate-900">

                <!-- Status Badge -->
                <div class="absolute bottom-2 right-2 w-7 h-7 rounded-full border-4 border-white dark:border-slate-900 shadow-xl flex items-center justify-center transition-all duration-300"
                    [ngClass]="{
                        'bg-emerald-500': profile()?.status === 'online',
                        'bg-rose-500': profile()?.status === 'busy',
                        'bg-slate-400': profile()?.status === 'offline'
                    }">
                </div>
            </div>

            <div class="text-center sm:text-left">
                <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-1 tracking-tight">{{
                    profile()?.nickname || 'Set Nickname' }}</h2>
                <div class="flex flex-col gap-1 items-center sm:items-start">
                    <span class="text-slate-400 dark:text-slate-500 font-medium text-sm">{{ profile()?.email }}</span>
                    <span
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400 uppercase tracking-widest mt-2 border border-primary-200 dark:border-primary-800/50">
                        {{ profile()?.role }}
                    </span>
                </div>
            </div>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-8">
            <!-- Avatar URL Field -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Avatar URL</label>
                <div class="relative group">
                    <input formControlName="avatarUrl" type="url" placeholder="https://example.com/avatar.jpg"
                        class="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all pl-11 dark:text-white placeholder-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400 group-focus-within:text-primary-500 transition-colors"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.172 13.828a4 4 0 015.656 0l4 4a4 4 0 11-5.656 5.656l-1.102-1.101" />
                    </svg>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nickname Field -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Nickname</label>
                    <div class="relative group">
                        <input formControlName="nickname" placeholder="Your display name"
                            class="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all pl-11 dark:text-white placeholder-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400 group-focus-within:text-primary-500 transition-colors"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>

                <!-- Gender Field -->
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Gender</label>
                    <div class="relative group">
                        <select formControlName="gender"
                            class="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all pl-11 dark:text-white appearance-none cursor-pointer">
                            <option value="">Prefer not to say</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400 group-focus-within:text-primary-500 transition-colors pointer-events-none"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="absolute right-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Bio Field -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Bio</label>
                <textarea formControlName="bio" rows="4" placeholder="Tell us about yourself..." maxlength="500"
                    class="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all dark:text-white placeholder-slate-400 resize-none"></textarea>
                <div class="flex justify-end pr-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{
                        profileForm.get('bio')?.value?.length || 0 }}/500</span>
                </div>
            </div>

            <!-- Status Field -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Status</label>
                <div class="relative group">
                    <select formControlName="status"
                        class="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all pl-11 dark:text-white appearance-none cursor-pointer">
                        <option value="online">Online</option>
                        <option value="busy">Busy</option>
                        <option value="offline">Appear Offline</option>
                    </select>
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 h-2.5 w-2.5 rounded-full" [ngClass]="{
                            'bg-emerald-500': profileForm.get('status')?.value === 'online',
                            'bg-rose-500': profileForm.get('status')?.value === 'busy',
                            'bg-slate-400': profileForm.get('status')?.value === 'offline'
                        }">
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="absolute right-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
            </div>

            <!-- Messages -->
            <div *ngIf="message()"
                class="animate-fade-in py-3 px-4 rounded-xl text-sm font-bold text-center transition-all"
                [ngClass]="{'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400': isSuccess(), 'bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400': !isSuccess()}">
                {{ message() }}
            </div>

            <!-- Submit Actions -->
            <div class="pt-6 flex justify-end">
                <button type="submit" [disabled]="profileForm.invalid || isLoading() || !profileForm.dirty"
                    class="w-full sm:w-auto px-10 py-4 bg-primary-600 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-black rounded-2xl shadow-xl shadow-primary-600/30 transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span *ngIf="!isLoading()">Update Profile</span>
                    <div *ngIf="isLoading()"
                        class="w-5 h-5 border-3 border-white/20 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>
        </form>
    </div>
</div>
