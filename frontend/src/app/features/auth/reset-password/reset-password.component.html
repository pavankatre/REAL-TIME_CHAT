<div
    class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
    <div class="max-w-md w-full glass p-8 rounded-2xl animate-fade-in text-slate-900 dark:text-white">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold tracking-tight">Set New Password</h2>
            <p class="mt-3 text-slate-500 dark:text-slate-400">Please enter your new password below.</p>
        </div>

        <form *ngIf="!successMessage()" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <!-- New Password Field -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">New Password</label>
                <div class="relative">
                    <input formControlName="newPassword" [type]="hidePassword() ? 'password' : 'text'"
                        placeholder="••••••••"
                        class="block w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">

                    <button type="button" (click)="togglePasswordVisibility()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-slate-600 transition-colors">
                        <svg *ngIf="hidePassword()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg *ngIf="!hidePassword()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.411m0 0L21 21m-2.101-2.101L17.5 17.5m-1.875-1.875L14 14M9 9l1.25 1.25M10.125 10.125L12 12m-2-2L9 9" />
                        </svg>
                    </button>
                </div>
                <!-- Errors -->
                <div class="mt-1 ml-1 h-5">
                    <p *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.hasError('required')"
                        class="text-xs text-red-500">Password is required</p>
                    <p *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.hasError('minlength')"
                        class="text-xs text-red-500">Minimum 6 characters required</p>
                </div>
            </div>

            <!-- Confirm Password Field -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Confirm
                    Password</label>
                <div class="relative">
                    <input formControlName="confirmPassword" [type]="hidePassword() ? 'password' : 'text'"
                        placeholder="••••••••"
                        class="block w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
                </div>
                <!-- Errors -->
                <div class="mt-1 ml-1 h-5">
                    <p *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.get('confirmPassword')?.hasError('required')"
                        class="text-xs text-red-500">Please confirm your password</p>
                    <p *ngIf="resetForm.touched && resetForm.hasError('mismatch') && !resetForm.get('confirmPassword')?.hasError('required')"
                        class="text-xs text-red-500">Passwords do not match</p>
                </div>
            </div>

            <!-- Global Error -->
            <div *ngIf="errorMessage()"
                class="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-xs text-center animate-fade-in">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="resetForm.invalid || isLoading() || !token"
                class="w-full h-12 flex items-center justify-center rounded-xl bg-primary-600 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold transition-all shadow-lg active:scale-[0.98]">
                <span *ngIf="!isLoading()">Reset Password</span>
                <span *ngIf="isLoading()" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Resetting...
                </span>
            </button>
        </form>

        <div *ngIf="successMessage()" class="space-y-8 py-4 animate-fade-in">
            <div
                class="p-6 rounded-2xl bg-green-50 dark:bg-green-900/10 border border-green-100 dark:border-green-800/50 text-center">
                <div
                    class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600 dark:text-green-400"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <p class="text-slate-700 dark:text-slate-300 font-medium">
                    {{ successMessage() }}
                </p>
            </div>

            <button routerLink="/login"
                class="w-full h-12 flex items-center justify-center rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-semibold transition-all hover:bg-slate-800 dark:hover:bg-slate-100 active:scale-[0.98]">
                Proceed to Login
            </button>
        </div>
    </div>
</div>
