<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <mat-card class="max-w-md w-full space-y-8 p-8 rounded-xl shadow-lg">
        <div class="text-center">
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900">Welcome Back</h2>
            <p class="mt-2 text-sm text-gray-600">Please sign in to your account</p>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Email address</mat-label>
                <input matInput formControlName="email" type="email" placeholder="Email address" required>
                <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
                <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Password</mat-label>
                <input matInput formControlName="password" [type]="hidePassword() ? 'password' : 'text'"
                    placeholder="Password" required>
                <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button">
                    <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
            </mat-form-field>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a routerLink="/forgot-password" class="font-medium text-indigo-600 hover:text-indigo-500">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div *ngIf="errorMessage()" class="text-red-500 text-sm text-center">
                {{ errorMessage() }}
            </div>

            <div>
                <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading()"
                    class="w-full py-2 text-lg">
                    <span *ngIf="!isLoading()">Sign in</span>
                    <span *ngIf="isLoading()">Signing in...</span>
                </button>
            </div>

            <div class="text-center mt-4 text-sm text-gray-600">
                Don't have an account?
                <a routerLink="/register" class="font-medium text-indigo-600 hover:text-indigo-500">
                    Register here
                </a>
            </div>
        </form>
    </mat-card>
</div>
