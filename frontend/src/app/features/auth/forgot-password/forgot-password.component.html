<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <mat-card class="max-w-md w-full space-y-8 p-8 rounded-xl shadow-lg">
        <div class="text-center">
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900">Reset Password</h2>
            <p class="mt-2 text-sm text-gray-600">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <form *ngIf="!emailSent()" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Email address</mat-label>
                <input matInput formControlName="email" type="email" placeholder="Email address" required>
                <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">Email is required</mat-error>
                <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
            </mat-form-field>

            <div *ngIf="errorMessage()" class="text-red-500 text-sm text-center">
                {{ errorMessage() }}
            </div>

            <div>
                <button mat-flat-button color="primary" type="submit" [disabled]="forgotForm.invalid || isLoading()"
                    class="w-full py-2 text-lg">
                    <span *ngIf="!isLoading()">Send Reset Link</span>
                    <span *ngIf="isLoading()">Sending...</span>
                </button>
            </div>

            <div class="text-center mt-4">
                <a routerLink="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Back to log
                    in</a>
            </div>
        </form>

        <div *ngIf="emailSent()" class="mt-8 text-center space-y-6">
            <div class="bg-green-50 text-green-800 p-4 rounded-md">
                We've sent an email to <strong>{{ forgotForm.value.email }}</strong> with a link to reset your password.
            </div>
            <button mat-stroked-button color="primary" routerLink="/login" class="w-full">Return to login</button>
        </div>
    </mat-card>
</div>
