<div
    class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
    <div class="max-w-md w-full glass p-8 rounded-2xl animate-fade-in text-slate-900 dark:text-white">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold tracking-tight">Reset Password</h2>
            <p class="mt-3 text-slate-500 dark:text-slate-400">Enter your email and we'll send you a link to reset your
                password.</p>
        </div>

        <form *ngIf="!emailSent()" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
                <input formControlName="email" type="email" placeholder="name@example.com"
                    class="block w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
                <div class="ml-1 h-5">
                    <p *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('required')"
                        class="text-xs text-red-500">Email is required</p>
                    <p *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('email')"
                        class="text-xs text-red-500">Please enter a valid email</p>
                </div>
            </div>

            <div *ngIf="errorMessage()"
                class="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-xs text-center animate-fade-in">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="forgotForm.invalid || isLoading()"
                class="w-full h-12 flex items-center justify-center rounded-xl bg-primary-600 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold transition-all shadow-lg active:scale-[0.98]">
                <span *ngIf="!isLoading()">Send Reset Link</span>
                <span *ngIf="isLoading()" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Sending...
                </span>
            </button>

            <div class="text-center pt-2">
                <a routerLink="/login"
                    class="text-sm font-bold text-primary-600 dark:text-primary-400 hover:text-primary-500 transition-colors">
                    Back to login
                </a>
            </div>
        </form>

        <div *ngIf="emailSent()" class="space-y-8 py-4 animate-fade-in">
            <div
                class="p-6 rounded-2xl bg-green-50 dark:bg-green-900/10 border border-green-100 dark:border-green-800/50 text-center">
                <div
                    class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600 dark:text-green-400"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <p class="text-slate-700 dark:text-slate-300">
                    We've sent an email to <br><strong class="text-slate-900 dark:text-white font-bold">{{
                        forgotForm.value.email }}</strong><br>
                    with a link to reset your password.
                </p>
            </div>

            <button routerLink="/login"
                class="w-full h-12 flex items-center justify-center rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-semibold transition-all hover:bg-slate-800 dark:hover:bg-slate-100 active:scale-[0.98]">
                Return to Login
            </button>
        </div>
    </div>
</div>
