<div
    class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
    <div class="max-w-md w-full glass p-8 rounded-2xl animate-fade-in text-slate-900 dark:text-white">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight">Verify OTP</h2>
            <div
                class="mt-4 p-4 rounded-xl bg-primary-50 dark:bg-primary-900/20 border border-primary-100 dark:border-primary-800/50">
                <p class="text-sm text-slate-600 dark:text-slate-400">We sent a 6-digit code to</p>
                <p class="mt-1 font-semibold text-primary-700 dark:text-primary-300">{{ maskedEmail() }}</p>
            </div>
        </div>

        <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-2 text-center">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Verification
                    Code</label>
                <input formControlName="otp" type="text" maxlength="6" placeholder="000000"
                    class="block w-full px-4 py-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-center text-3xl font-bold tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all placeholder:text-slate-200 dark:placeholder:text-slate-700">

                <div class="h-4">
                    <p *ngIf="otpForm.get('otp')?.touched && otpForm.get('otp')?.hasError('required')"
                        class="text-[10px] text-red-500">OTP is required</p>
                    <p *ngIf="otpForm.get('otp')?.touched && (otpForm.get('otp')?.hasError('pattern') || otpForm.get('otp')?.hasError('minlength'))"
                        class="text-[10px] text-red-500">Must be exactly 6 digits</p>
                </div>
            </div>

            <!-- Messages -->
            <div *ngIf="errorMessage()"
                class="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-xs text-center animate-fade-in">
                {{ errorMessage() }}
            </div>
            <div *ngIf="successMessage()"
                class="p-3 rounded-lg bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-600 dark:text-green-400 text-xs text-center animate-fade-in">
                {{ successMessage() }}
            </div>

            <!-- Submit Button -->
            <button type="submit" [disabled]="otpForm.invalid || isLoading()"
                class="w-full h-12 flex items-center justify-center rounded-xl bg-primary-600 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold transition-all shadow-lg active:scale-[0.98]">
                <span *ngIf="!isLoading()">Verify Account</span>
                <span *ngIf="isLoading()" class="flex items-center gap-2 text-sm">
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Verifying...
                </span>
            </button>

            <!-- Resend Button -->
            <div class="text-center pt-2">
                <button type="button" (click)="resendOtp()" [disabled]="resendCountdown() > 0 || isResending()"
                    class="text-sm font-semibold text-primary-600 dark:text-primary-400 hover:text-primary-500 disabled:text-slate-400 dark:disabled:text-slate-600 transition-colors">
                    <span *ngIf="resendCountdown() > 0">Resend Code in {{ resendCountdown() }}s</span>
                    <span *ngIf="resendCountdown() === 0 && !isResending()">Resend Code</span>
                    <span *ngIf="isResending()" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Resending...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
