<div class="flex items-center justify-between pr-4">
    <h2 mat-dialog-title>Group Info</h2>
    <button mat-icon-button (click)="dialogRef.close()"><mat-icon>close</mat-icon></button>
</div>

<mat-dialog-content class="w-full max-w-md pt-2">
    <!-- Group Details -->
    <div class="flex flex-col items-center mb-6">
        <div
            class="w-20 h-20 rounded-2xl bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-3xl mb-3 shadow-sm">
            {{ groupName.charAt(0) || 'G' }}
        </div>
        <div *ngIf="!isEditingName" class="flex items-center space-x-2">
            <h3 class="text-xl font-bold text-gray-800">{{ groupName }}</h3>
            <button mat-icon-button color="primary" *ngIf="isAdmin" (click)="isEditingName = true"><mat-icon
                    class="text-sm">edit</mat-icon></button>
        </div>
        <div *ngIf="isEditingName" class="flex items-center space-x-2 w-full px-4">
            <input type="text" [(ngModel)]="editNameInput"
                class="flex-1 px-3 py-1 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            <button mat-icon-button color="primary" (click)="saveName()"><mat-icon>check</mat-icon></button>
            <button mat-icon-button color="warn" (click)="isEditingName = false"><mat-icon>close</mat-icon></button>
        </div>
        <p class="text-sm text-gray-500 mt-1">{{ participants().length }} members</p>
    </div>

    <!-- Add Participants (Admin Only) -->
    <div *ngIf="isAdmin" class="mb-6">
        <div class="relative">
            <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearch()"
                placeholder="Search to add members..."
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none pl-10">
            <mat-icon class="absolute left-3 top-2.5 text-gray-400">person_add</mat-icon>
        </div>
        <div *ngIf="searchResults().length > 0" class="mt-2 border rounded-md max-h-32 overflow-y-auto">
            <div *ngFor="let user of searchResults()"
                class="p-2 hover:bg-gray-100 cursor-pointer flex items-center justify-between"
                (click)="addParticipant(user)">
                <div class="flex items-center space-x-2">
                    <img [src]="user.avatarUrl || 'https://via.placeholder.com/30'"
                        class="w-6 h-6 rounded-full object-cover bg-gray-200">
                    <span class="text-sm font-medium">{{ user.email }}</span>
                </div>
                <mat-icon class="text-brand-green text-sm">add_circle</mat-icon>
            </div>
        </div>
    </div>

    <!-- Member List -->
    <div>
        <h4 class="font-semibold text-gray-700 mb-2 border-b pb-1">Members</h4>
        <mat-list>
            <mat-list-item *ngFor="let p of participants()" class="px-0">
                <div class="flex items-center justify-between w-full">
                    <div class="flex items-center space-x-3">
                        <img [src]="p.avatarUrl || 'https://via.placeholder.com/35'"
                            class="w-8 h-8 rounded-full object-cover bg-gray-200">
                        <div>
                            <p class="font-medium text-sm text-gray-800 flex items-center gap-2">
                                {{ p.email === currentUserEmail ? 'You' : p.email }}
                                <span *ngIf="p._id === data.admin"
                                    class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold">Admin</span>
                            </p>
                        </div>
                    </div>
                    <button *ngIf="isAdmin && p._id !== currentUserId" mat-icon-button color="warn"
                        matTooltip="Remove from group" (click)="removeParticipant(p._id)" [disabled]="isLoading()">
                        <mat-icon>person_remove</mat-icon>
                    </button>
                </div>
            </mat-list-item>
        </mat-list>
    </div>

</mat-dialog-content>
